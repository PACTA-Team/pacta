<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1a1a1a; }
        .date { background: #f5f5f5; padding: 15px; border-radius: 6px; margin: 20px 0; font-size: 18px; }
        .footer { color: #666; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 style="color:#1a1a1a">{{.Title}}</h2>
    <div class="date">{{.ReportDate}}</div>
    <p>Please find the attached report for your review.</p>
    <p class="footer">{{.FooterText}}</p>
</body>
</html>
