<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1a1a1a; }
        .code-box { background: #f5f5f5; padding: 20px; text-align: center; font-size: 32px; font-weight: bold; letter-spacing: 8px; border-radius: 8px; margin: 20px 0; }
        .expiry { color: #666; font-size: 14px; }
        .footer { color: #666; font-size: 12px; }
    </style>
</head>
<body>
    <h2 style="color:#1a1a1a">{{.Title}}</h2>
    <p>{{.Instruction}}</p>
    <div class="code-box">{{.Code}}</div>
    <p class="expiry">{{.ExpiryText}}</p>
    <p class="footer">{{.FooterText}}</p>
</body>
</html>
