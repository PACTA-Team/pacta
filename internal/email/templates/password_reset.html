<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1a1a1a; }
        .button { display: inline-block; background: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 6px; margin: 20px 0; }
        .expiry { color: #666; font-size: 14px; }
        .ignore { color: #666; font-size: 12px; }
        .footer { color: #666; font-size: 12px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 style="color:#1a1a1a">{{.Title}}</h2>
    <p>{{.Greeting}}</p>
    <p>{{.Instruction}}</p>
    <a href="{{.ResetLink}}" class="button">Reset Password</a>
    <p class="expiry">{{.ExpiryText}}</p>
    <p class="ignore">{{.IgnoreText}}</p>
    <p class="footer">{{.FooterText}}</p>
</body>
</html>
