name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pacta_appweb/package-lock.json

      - name: Build frontend
        working-directory: pacta_appweb
        run: npm ci && npm run build

      - name: Copy frontend dist
        run: cp -r pacta_appweb/dist cmd/pacta/dist

      - name: Verify embedded assets
        run: |
          echo "Verifying embedded assets..."
          if [ ! -d "cmd/pacta/dist" ]; then
            echo "ERROR: cmd/pacta/dist directory not found"
            exit 1
          fi
          if [ ! -d "cmd/pacta/dist/assets" ]; then
            echo "ERROR: cmd/pacta/dist/assets directory not found"
            exit 1
          fi
          ASSET_COUNT=$(ls cmd/pacta/dist/assets | wc -l)
          echo "Found $ASSET_COUNT asset files"
          if [ "$ASSET_COUNT" -lt "10" ]; then
            echo "ERROR: Expected at least 10 assets, found $ASSET_COUNT"
            exit 1
          fi
          echo "Verification passed!"

      - name: Clean build artifacts
        run: rm -f pacta_appweb/*.tsbuildinfo

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
