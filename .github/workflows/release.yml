name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pacta_appweb/package-lock.json

      - name: Build frontend
        working-directory: pacta_appweb
        run: npm ci && npm run build

      - name: Copy frontend dist
        run: cp -r pacta_appweb/dist cmd/pacta/dist

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.46.0

      - name: Generate sqlc code
        run: sqlc generate

      - name: Verify generated code up-to-date
        run: git diff --exit-code internal/db/queries_gen.go

      - name: Clone llama.cpp
        run: |
          if [ ! -d "internal/ai/minirag/llama.cpp/.git" ]; then
            rm -rf internal/ai/minirag/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git internal/ai/minirag/llama.cpp
          fi

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: internal/ai/minirag/llama.cpp/build
          key: ${{ runner.os }}-llama-cpp-${{ hashFiles('internal/ai/minirag/llama.cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-llama-cpp-

      - name: Build llama.cpp
        run: |
          cd internal/ai/minirag/llama.cpp
          mkdir -p build && cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Build with CGO (embedded BGE)
        run: |
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I$(pwd)/internal/ai/minirag/llama.cpp/include \
                             -I$(pwd)/internal/ai/minirag/llama.cpp/ggml/include"
          export CGO_LDFLAGS="-L$(pwd)/internal/ai/minirag/llama.cpp/build \
                             -lllama -lggml -lggml-base -lm -lstdc++ -lpthread"
          go build -o pacta ./cmd/pacta
        env:
          CGO_ENABLED: 1

      - name: Run Go tests
        run: go test ./... -v -count=1 -timeout=10m

      - name: Vet Go code
        run: go vet ./...

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}