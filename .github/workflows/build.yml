name: Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pacta_appweb/package-lock.json

      - name: Build frontend
        working-directory: pacta_appweb
        run: npm ci && npm run build

      - name: Audit frontend dependencies
        working-directory: pacta_appweb
        run: npm audit --audit-level=high

      - name: Copy frontend dist
        run: cp -r pacta_appweb/dist cmd/pacta/dist

      - name: Tidy
        run: go mod tidy

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.30.0

      - name: Generate sqlc queries
        run: |
          cd internal/db
          sqlc generate
          go fmt ./...

      - name: Auto-commit sqlc-generated changes
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet internal/db/; then
            git add internal/db/
            git commit -m "ci(sqlc): auto-generate queries"
            if [ -n "$HEAD_REF" ]; then
              git push origin HEAD:$HEAD_REF
            else
              git push origin HEAD:$GITHUB_REF_NAME
            fi
            echo "✅ Committed and pushed sqlc-generated changes"
          else
            echo "✅ No sqlc-generated changes to commit"
          fi

      - name: Clone llama.cpp
        run: |
          if [ ! -d "internal/ai/minirag/llama.cpp/.git" ]; then
            rm -rf internal/ai/minirag/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git internal/ai/minirag/llama.cpp
          fi

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: internal/ai/minirag/llama.cpp/build
          key: ${{ runner.os }}-llama-cpp-${{ hashFiles('internal/ai/minirag/llama.cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-llama-cpp-

      - name: Build llama.cpp
        run: |
          cd internal/ai/minirag/llama.cpp
          mkdir -p build && cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Build FAISS
        working-directory: internal/ai/minirag/vector/faiss
        run: |
          if [ ! -d "faiss" ]; then
            git clone --depth 1 https://github.com/facebookresearch/faiss .
          fi
          mkdir -p build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DFAISS_ENABLE_GPU=OFF -DFAISS_ENABLE_PYTHON=OFF -DBUILD_SHARED_LIBS=OFF ..
          make -j$(nproc) faiss

      - name: Run MiniRAG tests
        env:
          CGO_ENABLED: 1
        run: go test ./internal/ai/minirag/... -v -count=1 -timeout=10m

      - name: Build with CGO (embedded BGE)
        run: |
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I$(pwd)/internal/ai/minirag/llama.cpp/include \
                             -I$(pwd)/internal/ai/minirag/llama.cpp/ggml/include"
          export CGO_LDFLAGS="-L$(pwd)/internal/ai/minirag/llama.cpp/build \
                             -lllama -lggml -lggml-base -lm -lstdc++ -lpthread"
          go build -ldflags="-s -w" -o pacta ./cmd/pacta
        env:
          CGO_ENABLED: 1

      - name: Vet
        run: go vet ./...

      - name: Run Go tests
        run: go test ./... -v -count=1 -timeout=10m

      - name: Build Go binary
        run: go build ./...

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...