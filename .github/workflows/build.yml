name: Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pacta_appweb/package-lock.json

      - name: Build frontend
        working-directory: pacta_appweb
        run: npm ci && npm run build

      - name: Audit frontend dependencies
        working-directory: pacta_appweb
        run: npm audit --audit-level=high

      - name: Copy frontend dist
        run: cp -r pacta_appweb/dist cmd/pacta/dist

      - name: Tidy
        run: go mod tidy

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.46.0

      - name: Generate sqlc queries
        run: |
          cd internal/db
          sqlc generate
          go fmt ./...

      - name: Verify generated code is up-to-date
        run: |
          git diff --exit-code internal/db/ || (
            echo "Error: Generated sqlc code is out of date."
            echo "Run 'cd internal/db && sqlc generate' locally and commit the changes."
            exit 1
          )

      - name: Clone llama.cpp
        run: |
          if [ ! -d "internal/ai/minirag/llama.cpp/.git" ]; then
            rm -rf internal/ai/minirag/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git internal/ai/minirag/llama.cpp
          fi

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: internal/ai/minirag/llama.cpp/build
          key: ${{ runner.os }}-llama-cpp-${{ hashFiles('internal/ai/minirag/llama.cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-llama-cpp-

      - name: Build llama.cpp
        run: |
          cd internal/ai/minirag/llama.cpp
          mkdir -p build && cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Download Qwen2.5-0.5B-Instruct GGUF model (cached)
        run: |
          mkdir -p internal/ai/minirag/models
          if [ ! -f "internal/ai/minirag/models/qwen2.5-0.5b-instruct-q4_0.gguf" ]; then
            echo "Downloading Qwen2.5-0.5B-Instruct GGUF model..."
            curl -L -o internal/ai/minirag/models/qwen2.5-0.5b-instruct-q4_0.gguf \
              https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/qwen2.5-0.5b-instruct-q4_0.gguf
          fi

      - name: Build with CGo (embedded Qwen2.5-0.5B)
        run: |
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I$(pwd)/internal/ai/minirag/llama.cpp/include \
                             -I$(pwd)/internal/ai/minirag/llama.cpp/ggml/include"
          export CGO_LDFLAGS="-L$(pwd)/internal/ai/minirag/llama.cpp/build/bin \
                              -lllama -lggml -lggml-base"
          go build -o pacta ./cmd/pacta
        env:
          CGO_ENABLED: 1

      - name: Vet
        run: go vet ./...

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
