name: Build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pacta_appweb/package-lock.json

      - name: Build frontend
        working-directory: pacta_appweb
        run: npm ci && npm run build

      - name: Audit frontend dependencies
        working-directory: pacta_appweb
        run: npm audit --audit-level=high

      - name: Copy frontend dist
        run: cp -r pacta_appweb/dist cmd/pacta/dist

      - name: Tidy
        run: go mod tidy

      - name: Clone llama.cpp
        run: |
          if [ ! -d "internal/ai/minirag/llama.cpp/.git" ]; then
            rm -rf internal/ai/minirag/llama.cpp
            git clone --depth 1 https://github.com/ggerganov/llama.cpp.git internal/ai/minirag/llama.cpp
          fi

      - name: Cache llama.cpp build
        uses: actions/cache@v4
        with:
          path: internal/ai/minirag/llama.cpp/build
          key: ${{ runner.os }}-llama-cpp-${{ hashFiles('internal/ai/minirag/llama.cpp/**') }}
          restore-keys: |
            ${{ runner.os }}-llama-cpp-

      - name: Build llama.cpp
        run: |
          cd internal/ai/minirag/llama.cpp
          mkdir -p build && cd build
          cmake .. -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Download Phi-3.5-mini-instruct GGUF model (cached)
        run: |
          mkdir -p internal/ai/minirag/models
          if [ ! -f "internal/ai/minirag/models/phi-3.5-mini-instruct.Q4_K_M.gguf" ]; then
            echo "Downloading Phi-3.5-mini-instruct GGUF model..."
            curl -L -o internal/ai/minirag/models/phi-3.5-mini-instruct.Q4_K_M.gguf \
              https://huggingface.co/microsoft/Phi-3.5-mini-instruct-gguf/resolve/main/phi-3.5-mini-instruct.Q4_K_M.gguf
          fi

      - name: Build with CGo (embedded Phi-3.5)
        run: |
          export CGO_ENABLED=1
          export CGO_CFLAGS="-I$(pwd)/internal/ai/minirag/llama.cpp/include"
          export CGO_LDFLAGS="-L$(pwd)/internal/ai/minirag/llama.cpp/build -llama -lm -lstdc++ -lpthread"
          go build -o pacta ./cmd/pacta
        env:
          CGO_ENABLED: 1


      - name: Vet
        run: go vet ./...

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
