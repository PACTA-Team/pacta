name: Generate SQLC Queries

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration even if no schema changes detected'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    name: Generate Go code from SQL queries using sqlc
    runs-on: ubuntu-latest-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Install sqlc
        run: |
          go install github.com/kyleconroy/sqlc/cmd/sqlc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Verify sqlc version
        run: sqlc --version

      - name: Generate sqlc code
        run: |
          echo "Generating Go queries from SQL migrations..."
          sqlc generate --config internal/db/sqlc.yaml
          echo "sqlc generation completed."

      - name: Show generated/updated files
        run: |
          echo "Files changed by sqlc:"
          git status --porcelain internal/db/

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit sqlc generated code to temporary branch
        run: |
          BRANCH="sqlc/generated-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add internal/db/queries.go internal/db/queries_ext.go internal/db/migrations/
          # Only add files that actually changed to avoid empty commits
          if git diff --cached --quiet; then
            echo "No changes detected in sqlc-generated code. Skipping commit."
            exit 0
          fi
          git commit -m "build: regenerate sqlc queries and migrations
          Auto-generated by sqlc workflow. Reviewed and approved."
          echo "Created branch $BRANCH with sqlc updates."

      - name: Push branch
        run: |
          git push origin HEAD

      - name: Create Pull Request to main
        uses: peter-evans/create-pull-request@v5
        with:
          title: "build: regenerate sqlc queries from SQL schema"
          body: |
            This PR updates the Go database query code generated by `sqlc`.
            
            Changes:
            - Regenerated `internal/db/queries.go` and `internal/db/queries_ext.go` from SQL migrations
            - Includes any new migrations in `internal/db/migrations/`
            
            The regular MiniRAG build workflow depends on these files being up-to-date.
            Please review and merge to main.
            
            Trigger: Manual workflow dispatch `Generate SQLC Queries`
          branch: "sqlc/generated-$(date +%Y%m%d-%H%M%S)"
          base: main
          delete-branch: true
          labels: |
            build
            ci-generated
            database
          assignees: |
            ${{ github.actor }}

      - name: Output PR URL
        if: steps.pr.outputs.pull-request-url != ''
        run: |
          echo "Pull Request created: ${{ steps.pr.outputs.pull-request-url }}"
