name: Convert Embedding Model

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration even if GGUF exists'
        required: false
        default: false
        type: boolean

jobs:
  convert:
    name: Convert paraphrase-MiniLM-L3-v2 to GGUF Q8_0
    runs-on: ubuntu-latest-24.04
    timeout-minutes: 90
    permissions:
      contents: write  # needed to push branch and create PR
    
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv and dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system transformers torch

      - name: Clone llama.cpp
        run: |
          git clone --depth 1 https://github.com/ggerganov/llama.cpp internal/ai/minirag/llama.cpp

      - name: Run model conversion
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}  # optional, for higher rate limits
        run: |
          python scripts/convert_embedding_model.py --force

      - name: Verify GGUF output
        run: |
          if [ -f "internal/ai/minirag/models/paraphrase-MiniLM-L3-v2-Q8_0.gguf" ]; then
            echo "Model successfully generated."
            ls -lh internal/ai/minirag/models/paraphrase-MiniLM-L3-v2-Q8_0.gguf
          else
            echo "ERROR: GGUF file not found."
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit model to temporary branch
        run: |
          BRANCH="model/generated-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add internal/ai/minirag/models/paraphrase-MiniLM-L3-v2-Q8_0.gguf
          # Stage only the model file; avoid staging other changes
          git commit -m "chore(minirag): auto-generate embedding model GGUF (Q8_0)"
          echo "Created branch $BRANCH with model commit."

      - name: Push branch
        run: |
          git push origin HEAD

      - name: Create Pull Request to main
        uses: peter-evans/create-pull-request@v5
        with:
          title: "chore(minirag): add generated embedding model (paraphrase-MiniLM-L3-v2 Q8_0)"
          body: |
            This PR adds the embedding model file generated by the conversion workflow.
            
            - Model: `sentence-transformers/paraphrase-MiniLM-L3-v2`
            - Format: GGUF Q8_0 (65MB)
            - Path: `internal/ai/minirag/models/paraphrase-MiniLM-L3-v2-Q8_0.gguf`
            
            The model is required for the MiniRAG embedding-only RAG system.
            
            Please review and merge. Once merged, the regular CI build will compile the binary with the embedded model.
          branch: "model/generated-$(date +%Y%m%d-%H%M%S)"
          base: main
          delete-branch: true
          labels: |
            chore
            ci-generated
            model
          assignees: |
            ${{ github.actor }}
